<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARISSA BROS Project | Level Selection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #5c94fc;
            background-image: 
                url('https://www.transparenttextures.com/patterns/pixel-weave.png'),
                linear-gradient(180deg, #5c94fc 0%, #2980b9 100%);
            margin: 0;
            color: #333;
            overflow-x: hidden;
            min-height: 100vh;
        }

        header {
            background-color: #e52521;
            color: white;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 8px solid #a50b08;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8em;
            text-shadow: 4px 4px 0px #000;
            margin: 0;
        }

        nav {
            background-color: #4338ca;
            padding: 10px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 6px solid #2e268f;
        }

        nav a {
            color: white;
            padding: 10px 15px;
            display: inline-block;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7em;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #f59e0b;
            color: #000;
            transform: scale(1.1);
            border-radius: 5px;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 0px; 
            border: 6px solid #333;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.2);
            position: relative;
        }

        .container h2 {
            font-family: 'Press Start 2P', cursive;
            color: #e52521;
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .container p {
            text-align: center;
            font-weight: bold;
            color: #1a661a;
            margin-bottom: 30px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
        }

        .project-card {
            background-color: #f39c12;
            border: 5px solid #333;
            overflow: hidden;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 
                inset -6px -6px 0px #d35400, 
                inset 6px 6px 0px #fbc531,
                8px 8px 0px rgba(0,0,0,0.1);
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .project-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 5px solid #333;
            display: block;
        }

        .project-card a {
            display: block;
            padding: 15px 5px;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6em;
            color: white;
            text-shadow: 2px 2px 0px #000;
            background-color: #333;
            transition: 0.2s;
        }

        .project-card a:hover {
            background-color: #ffca18;
            color: #333;
            text-shadow: none;
        }

        .floating-icon {
            position: absolute;
            font-size: 2.5em;
            animation: float 3s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        footer {
            background-color: #333;
            color: #ffca18;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 8px solid #e52521;
            font-family: 'Press Start 2P', cursive;
            line-height: 1.8;
        }

        footer p { margin: 5px 0; font-size: 0.65em; }

        @media (max-width: 768px) {
            header h1 { font-size: 1.1em; }
            .container { width: 85%; padding: 20px; }
            nav a { font-size: 0.5em; padding: 8px; }
        }
    </style>
</head>

<body>

<header>

    <h2>MY PROJECTS</h2>

            <img src="https://i.pinimg.com/736x/01/6a/0c/016a0c5c4417a78377d54025d2e29383.jpg" alt="Website Project">

</div>
